spring:
  application:
    name: evgo
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

cookie:
  access-token:
    name: ${COOKIE_ACCESS_TOKEN_NAME}
    max-age: ${COOKIE_ACCESS_TOKEN_MAX_AGE}
    http-only: ${COOKIE_HTTP_ONLY}
    secure: ${COOKIE_SECURE}
    same-site: ${COOKIE_SAME_SITE}
    path: ${COOKIE_PATH}
  refresh-token:
    name: ${COOKIE_REFRESH_TOKEN_NAME}
    max-age: ${COOKIE_REFRESH_TOKEN_MAX_AGE}
    http-only: ${COOKIE_HTTP_ONLY}
    secure: ${COOKIE_SECURE}
    same-site: ${COOKIE_SAME_SITE}
    path: ${COOKIE_PATH}

logging:
  level:
    com.project.evgo: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

# Email configuration
spring.mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

app:
  name: EV-Go
  email:
    from: ${MAIL_USERNAME}
    from-name: EV-Go Support
  upload:
    max-size: ${APP_UPLOAD_MAX_SIZE:10485760}

  activation:
    token:
      expiry-hours: ${APP_ACTIVATION_TOKEN_EXPIRY_HOURS:24}

  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}

google:
  client-id: ${GOOGLE_CLIENT_ID}

cloudinary:
    cloud-name: ${CLOUD_NAME}
    api-key: ${CLOUD_API_KEY}
    api-secret: ${CLOUD_API_SECRET}

zalopay:
  app-id: ${ZALOPAY_APP_ID}
  key1: ${ZALOPAY_KEY1}
  key2: ${ZALOPAY_KEY2}
  endpoint: ${ZALOPAY_ENDPOINT}
  callback-url: ${ZALOPAY_CALLBACK_URL}
