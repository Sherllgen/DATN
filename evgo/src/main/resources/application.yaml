spring:
  application:
    name: evgo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: ${SERVER_PORT}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

cookie:
  access-token:
    name: ${COOKIE_ACCESS_TOKEN_NAME}
    max-age: ${COOKIE_ACCESS_TOKEN_MAX_AGE}
    http-only: ${COOKIE_HTTP_ONLY}
    secure: ${COOKIE_SECURE}
    same-site: ${COOKIE_SAME_SITE}
    path: ${COOKIE_PATH}
  refresh-token:
    name: ${COOKIE_REFRESH_TOKEN_NAME}
    max-age: ${COOKIE_REFRESH_TOKEN_MAX_AGE}
    http-only: ${COOKIE_HTTP_ONLY}
    secure: ${COOKIE_SECURE}
    same-site: ${COOKIE_SAME_SITE}
    path: ${COOKIE_PATH}

logging:
  level:
    com.project.evgo: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
