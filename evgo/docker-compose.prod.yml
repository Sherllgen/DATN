version: "3.8"

services:
  # =====================
  # Backend API Only (Using Supabase & Upstash)
  # =====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evgo-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      
networks:
  evgo-network:
    driver: bridge
